<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Gói thành viên hiện tại')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/alerts :: alerts}"></div>
<main class="container-xxl py-4">
    <div class="row g-4">
        <div class="col-lg-5">
            <div class="glass-panel h-100">
                <h1 class="h3 text-white mb-3">Gói hiện tại</h1>
                <div th:if="${currentSubscription != null}">
                    <span class="badge text-bg-danger mb-3" th:text="${currentSubscription.plan.accessLevel}">PREMIUM</span>
                    <h2 class="display-6 fw-bold text-white" th:text="${currentSubscription.plan.name}">Premium</h2>
                    <p class="text-secondary" th:text="${currentSubscription.plan.featureDescription}">Feature</p>
                    <div class="small text-secondary mb-2">Bắt đầu: <strong class="text-white" th:text="${currentSubscription.startDate}">2026-03-17</strong></div>
                    <div class="small text-secondary mb-2">Kết thúc: <strong class="text-white" th:text="${currentSubscription.endDate}">2026-04-17</strong></div>
                    <div class="small text-secondary">Còn lại <strong class="text-accent" th:text="${remainingDays}">0</strong> ngày</div>
                </div>
                <div th:if="${currentSubscription == null}">
                    <span class="badge text-bg-success mb-3">FREE</span>
                    <h2 class="display-6 fw-bold text-white">Bạn đang ở gói Free</h2>
                    <p class="text-secondary">Nâng cấp để mở khóa Standard hoặc Premium.</p>
                </div>
                <a class="btn btn-accent mt-4" th:href="@{/subscription/plans}">Xem bảng giá</a>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="glass-panel">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="h4 text-white mb-0">Lịch sử mua gói</h2>
                    <a th:href="@{/user/wallet}" class="btn btn-sm btn-outline-light">Đi tới ví tiền</a>
                </div>
                <div class="table-responsive">
                    <table class="table table-dark align-middle">
                        <thead>
                        <tr>
                            <th>Gói</th>
                            <th>Khoảng thời gian</th>
                            <th>Trạng thái</th>
                            <th>Đã thanh toán</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${subscriptionHistory}">
                            <td>
                                <div class="fw-semibold" th:text="${item.plan.name}">Standard</div>
                                <div class="small text-secondary" th:text="${item.plan.accessLevel}">STANDARD</div>
                            </td>
                            <td th:text="${item.startDate + ' → ' + item.endDate}">2026</td>
                            <td><span class="badge text-bg-dark" th:text="${item.status}">ACTIVE</span></td>
                            <td th:text="${#numbers.formatDecimal(item.paidAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
