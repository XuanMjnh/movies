<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Quản lý tập phim')}"></head>
<body>
<div class="container-fluid admin-shell">
    <div class="row g-0 min-vh-100">
        <div class="col-xl-2 col-lg-3 d-none d-lg-block">
            <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
        </div>
        <div class="col-xl-10 col-lg-9">
            <div class="p-4 p-lg-5">
                <div th:replace="~{fragments/alerts :: alerts}"></div>

                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
                    <div>
                        <h1 class="fw-bold text-white mb-1">Quản lý tập - <span th:text="${movie.title}">Movie</span></h1>
                        <p class="text-secondary mb-0">Thêm URL video, preview miễn phí và thứ tự tập.</p>
                    </div>
                    <a class="btn btn-outline-light" th:href="@{/admin/movies}">Quay lại phim</a>
                </div>
                <div class="row g-4">
                    <div class="col-xl-5">
                        <div class="glass-panel">
                            <h3 class="h5 text-white mb-3" th:text="${episodeForm.id == null ? 'Thêm tập mới' : 'Cập nhật tập'}">Thêm tập</h3>
                            <form th:action="@{/admin/movies/episodes/save}" th:object="${episodeForm}" method="post" class="vstack gap-3">
                                <input type="hidden" th:field="*{id}">
                                <input type="hidden" th:field="*{movieId}">
                                <div><label class="form-label">Số tập</label><input type="number" th:field="*{episodeNumber}" class="form-control"></div>
                                <div><label class="form-label">Tên tập</label><input th:field="*{title}" class="form-control"></div>
                                <div><label class="form-label">Video URL</label><input th:field="*{videoUrl}" class="form-control"></div>
                                <div><label class="form-label">Thời lượng (phút)</label><input type="number" th:field="*{durationMinutes}" class="form-control"></div>
                                <div class="d-flex gap-4">
                                    <div class="form-check"><input class="form-check-input" type="checkbox" th:field="*{freePreview}"><label class="form-check-label">Free preview</label></div>
                                    <div class="form-check"><input class="form-check-input" type="checkbox" th:field="*{active}"><label class="form-check-label">Active</label></div>
                                </div>
                                <button class="btn btn-accent">Lưu tập phim</button>
                            </form>
                        </div>
                    </div>
                    <div class="col-xl-7">
                        <div class="glass-panel">
                            <div class="table-responsive">
                                <table class="table table-dark align-middle mb-0">
                                    <thead><tr><th>Tập</th><th>Title</th><th>Preview</th><th>Active</th><th></th></tr></thead>
                                    <tbody>
                                    <tr th:each="episode : ${episodes}">
                                        <td th:text="${episode.episodeNumber}">1</td>
                                        <td th:text="${episode.title}">Title</td>
                                        <td th:text="${episode.freePreview}">false</td>
                                        <td th:text="${episode.active}">true</td>
                                        <td>
                                            <div class="d-flex gap-2 justify-content-end">
                                                <a class="btn btn-sm btn-outline-warning" th:href="@{/admin/movies/{movieId}/episodes/{episodeId}/edit(movieId=${movie.id}, episodeId=${episode.id})}">Sửa</a>
                                                <form th:action="@{/admin/movies/{movieId}/episodes/{episodeId}/delete(movieId=${movie.id}, episodeId=${episode.id})}" method="post">
                                                    <button class="btn btn-sm btn-outline-danger">Xóa</button>
                                                </form>
                                            </div>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
