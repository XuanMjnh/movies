<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Giao dịch & lịch sử gói')}"></head>
<body>
<div class="container-fluid admin-shell">
    <div class="row g-0 min-vh-100">
        <div class="col-xl-2 col-lg-3 d-none d-lg-block">
            <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
        </div>
        <div class="col-xl-10 col-lg-9">
            <div class="p-4 p-lg-5">
                <div th:replace="~{fragments/alerts :: alerts}"></div>

                <div class="glass-panel mb-4">
                    <h1 class="h4 text-white mb-3">Wallet transactions</h1>
                    <div class="table-responsive"><table class="table table-dark align-middle mb-0"><thead><tr><th>User</th><th>Mã GD</th><th>Loại</th><th>Trạng thái</th><th>Số tiền</th><th>Số dư sau GD</th></tr></thead><tbody><tr th:each="tx : ${walletTransactions}"><td th:text="${tx.user.email}">user</td><td th:text="${tx.referenceCode}">ref</td><td th:text="${tx.type}">DEPOSIT</td><td th:text="${tx.status}">PENDING</td><td th:text="${#numbers.formatDecimal(tx.amount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0</td><td th:text="${#numbers.formatDecimal(tx.balanceAfter, 0, 'COMMA', 0, 'POINT')} + ' đ'">0</td></tr></tbody></table></div>
                </div>
                <div class="glass-panel mb-4">
                    <h1 class="h4 text-white mb-3">Payment transactions</h1>
                    <div class="table-responsive"><table class="table table-dark align-middle mb-0"><thead><tr><th>User</th><th>Provider</th><th>Reference</th><th>Số tiền</th><th>Status</th></tr></thead><tbody><tr th:each="payment : ${paymentTransactions}"><td th:text="${payment.user.email}">user</td><td th:text="${payment.provider}">provider</td><td th:text="${payment.externalReference}">ref</td><td th:text="${#numbers.formatDecimal(payment.amount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0</td><td th:text="${payment.status}">SUCCESS</td></tr></tbody></table></div>
                </div>
                <div class="glass-panel">
                    <h1 class="h4 text-white mb-3">Subscription history</h1>
                    <div class="table-responsive"><table class="table table-dark align-middle mb-0"><thead><tr><th>User</th><th>Plan</th><th>Trạng thái</th><th>Thời gian</th><th>Đã thanh toán</th></tr></thead><tbody><tr th:each="item : ${subscriptionHistory}"><td th:text="${item.user.email}">user</td><td th:text="${item.plan.name}">Premium</td><td th:text="${item.status}">ACTIVE</td><td th:text="${item.startDate + ' → ' + item.endDate}">range</td><td th:text="${#numbers.formatDecimal(item.paidAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0</td></tr></tbody></table></div>
                </div>

            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
