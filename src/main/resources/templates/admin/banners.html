<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Quản lý banner')}"></head>
<body>
<div class="container-fluid admin-shell">
    <div class="row g-0 min-vh-100">
        <div class="col-xl-2 col-lg-3 d-none d-lg-block">
            <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
        </div>
        <div class="col-xl-10 col-lg-9">
            <div class="p-4 p-lg-5">
                <div th:replace="~{fragments/alerts :: alerts}"></div>

                <div class="row g-4">
                    <div class="col-xl-5">
                        <div class="glass-panel">
                            <h1 class="h4 text-white mb-3">Thêm / sửa banner</h1>
                            <form th:action="@{/admin/banners/save}" th:object="${bannerForm}" method="post" enctype="multipart/form-data" class="vstack gap-3">
                                <input type="hidden" th:field="*{id}">
                                <input type="hidden" th:field="*{existingImageUrl}">
                                <div><label class="form-label">Tiêu đề</label><input th:field="*{title}" class="form-control"></div>
                                <div><label class="form-label">Phụ đề</label><textarea th:field="*{subtitle}" class="form-control" rows="3"></textarea></div>
                                <div><label class="form-label">Ảnh banner</label><input type="file" th:field="*{imageFile}" class="form-control"></div>
                                <div class="row g-3"><div class="col-md-6"><label class="form-label">CTA Text</label><input th:field="*{ctaText}" class="form-control"></div><div class="col-md-6"><label class="form-label">CTA Link</label><input th:field="*{ctaLink}" class="form-control"></div></div>
                                <div class="row g-3"><div class="col-md-6"><label class="form-label">Display order</label><input type="number" th:field="*{displayOrder}" class="form-control"></div><div class="col-md-6"><label class="form-label">Liên kết phim</label><select th:field="*{movieId}" class="form-select"><option value="">Không liên kết</option><option th:each="movie : ${movies}" th:value="${movie.id}" th:text="${movie.title}"></option></select></div></div>
                                <div class="form-check"><input class="form-check-input" type="checkbox" th:field="*{active}"><label class="form-check-label">Active</label></div>
                                <button class="btn btn-accent">Lưu banner</button>
                            </form>
                        </div>
                    </div>
                    <div class="col-xl-7">
                        <div class="glass-panel">
                            <h1 class="h4 text-white mb-3">Danh sách banner</h1>
                            <div class="table-responsive"><table class="table table-dark align-middle mb-0"><thead><tr><th>Banner</th><th>Order</th><th>Active</th><th></th></tr></thead><tbody><tr th:each="banner : ${banners}"><td><div class="d-flex gap-3 align-items-center"><img th:src="${banner.imageUrl}" class="admin-thumb" th:alt="${banner.title}"><div><div class="fw-semibold" th:text="${banner.title}">Title</div><div class="small text-secondary" th:text="${banner.subtitle}">Sub</div></div></div></td><td th:text="${banner.displayOrder}">1</td><td th:text="${banner.active}">true</td><td><div class="d-flex gap-2 justify-content-end"><a class="btn btn-sm btn-outline-light" th:href="@{/admin/banners/{bannerId}/edit(bannerId=${banner.id})}">Sửa</a><form th:action="@{/admin/banners/{bannerId}/delete(bannerId=${banner.id})}" method="post"><button class="btn btn-sm btn-outline-danger">Xóa</button></form></div></td></tr></tbody></table></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
