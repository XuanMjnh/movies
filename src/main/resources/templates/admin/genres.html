<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Quản lý thể loại')}"></head>
<body>
<div class="container-fluid admin-shell">
    <div class="row g-0 min-vh-100">
        <div class="col-xl-2 col-lg-3 d-none d-lg-block">
            <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
        </div>
        <div class="col-xl-10 col-lg-9">
            <div class="p-4 p-lg-5">
                <div th:replace="~{fragments/alerts :: alerts}"></div>

                <div class="row g-4">
                    <div class="col-xl-4">
                        <div class="glass-panel">
                            <h1 class="h4 text-white mb-3">Thêm / sửa thể loại</h1>
                            <form th:action="@{/admin/genres/save}" th:object="${genreForm}" method="post" class="vstack gap-3">
                                <input type="hidden" th:field="*{id}">
                                <div><label class="form-label">Tên thể loại</label><input th:field="*{name}" class="form-control"></div>
                                <div><label class="form-label">Mô tả</label><textarea th:field="*{description}" class="form-control" rows="4"></textarea></div>
                                <button class="btn btn-accent">Lưu thể loại</button>
                            </form>
                        </div>
                    </div>
                    <div class="col-xl-8">
                        <div class="glass-panel">
                            <h1 class="h4 text-white mb-3">Danh sách thể loại</h1>
                            <div class="table-responsive"><table class="table table-dark align-middle mb-0"><thead><tr><th>Tên</th><th>Mô tả</th><th></th></tr></thead><tbody><tr th:each="genre : ${genres}"><td th:text="${genre.name}">Action</td><td th:text="${genre.description}">Desc</td><td><div class="d-flex gap-2 justify-content-end"><a class="btn btn-sm btn-outline-light" th:href="@{/admin/genres/{genreId}/edit(genreId=${genre.id})}">Sửa</a><form th:action="@{/admin/genres/{genreId}/delete(genreId=${genre.id})}" method="post"><button class="btn btn-sm btn-outline-danger">Xóa</button></form></div></td></tr></tbody></table></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
