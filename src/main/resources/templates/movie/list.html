<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Danh sách phim')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/alerts :: alerts}"></div>
<main class="container-fluid container-stream py-4 py-lg-5">
    <section class="hero-inline mb-4">
        <div>
            <p class="eyebrow mb-2">Kho phim</p>
            <h1 class="hero-inline-title mb-2">Phim mới cập nhật liên tục</h1>
            <p class="section-subtitle mb-0">Lọc theo thể loại, quốc gia, năm phát hành, gói xem và loại phim.</p>
        </div>
        <div class="badge badge-total">Tổng: <span th:text="${moviePage != null ? moviePage.totalElements : 0}">0</span> phim</div>
    </section>

    <section class="glass-panel filter-panel mb-4">
        <form th:action="@{/movies}" method="get" class="row g-3 align-items-end">
            <div class="col-12 col-xl-3">
                <label class="form-label text-secondary small">Từ khóa</label>
                <input type="text" class="form-control" name="keyword" placeholder="Tên phim, tên gốc..." th:value="${filter != null ? filter.keyword : ''}">
            </div>
            <div class="col-6 col-xl-2">
                <label class="form-label text-secondary small">Thể loại</label>
                <select class="form-select" name="genreId">
                    <option value="">Tất cả thể loại</option>
                    <option th:each="genre : ${genres}" th:value="${genre.id}" th:selected="${filter != null and filter.genreId == genre.id}" th:text="${genre.name}"></option>
                </select>
            </div>
            <div class="col-6 col-xl-2">
                <label class="form-label text-secondary small">Quốc gia</label>
                <select class="form-select" name="countryId">
                    <option value="">Tất cả quốc gia</option>
                    <option th:each="country : ${countries}" th:value="${country.id}" th:selected="${filter != null and filter.countryId == country.id}" th:text="${country.name}"></option>
                </select>
            </div>
            <div class="col-6 col-xl-1">
                <label class="form-label text-secondary small">Năm</label>
                <input type="number" class="form-control" name="releaseYear" placeholder="2026" th:value="${filter != null ? filter.releaseYear : ''}">
            </div>
            <div class="col-6 col-xl-2">
                <label class="form-label text-secondary small">Gói xem</label>
                <select class="form-select" name="accessLevel">
                    <option value="">Mọi gói</option>
                    <option th:each="level : ${accessLevels}" th:value="${level}" th:selected="${filter != null and filter.accessLevel == level}" th:text="${level}"></option>
                </select>
            </div>
            <div class="col-6 col-xl-2">
                <label class="form-label text-secondary small">Loại phim</label>
                <select class="form-select" name="movieType">
                    <option value="">Phim lẻ & bộ</option>
                    <option th:each="type : ${movieTypes}" th:value="${type}" th:selected="${filter != null and filter.movieType == type}" th:text="${type}"></option>
                </select>
            </div>
            <div class="col-6 col-xl-2">
                <label class="form-label text-secondary small">Sắp xếp</label>
                <select class="form-select" name="sortBy">
                    <option value="newest" th:selected="${filter != null and filter.sortBy == 'newest'}">Mới nhất</option>
                    <option value="popular" th:selected="${filter != null and filter.sortBy == 'popular'}">Phổ biến</option>
                    <option value="rating" th:selected="${filter != null and filter.sortBy == 'rating'}">Rating cao</option>
                    <option value="title" th:selected="${filter != null and filter.sortBy == 'title'}">Theo tên</option>
                </select>
            </div>
            <div class="col-12 col-xl-10 d-flex gap-2 flex-wrap">
                <button class="btn btn-accent px-4">Lọc phim</button>
                <a class="btn btn-surface-outline" th:href="@{/movies}">Reset</a>
            </div>
        </form>
    </section>

    <section class="section-shell">
        <div class="row row-cols-2 row-cols-md-3 row-cols-xl-5 row-cols-xxl-6 g-4" th:if="${moviePage != null and moviePage.totalElements > 0}">
            <th:block th:each="movie : ${moviePage.content}">
                <div th:replace="~{fragments/movie-card :: movieCard(movie=${movie})}"></div>
            </th:block>
        </div>

        <div class="text-center py-5" th:if="${moviePage == null or moviePage.totalElements == 0}">
            <div class="glass-panel py-5">
                <i class="bi bi-film fs-1 text-accent"></i>
                <h3 class="text-white mt-3">Không tìm thấy phim phù hợp</h3>
                <p class="text-secondary">Thử thay đổi bộ lọc hoặc từ khóa tìm kiếm.</p>
            </div>
        </div>

        <nav th:if="${moviePage != null and moviePage.totalPages > 1}" class="mt-4">
            <ul class="pagination justify-content-center app-pagination">
                <li class="page-item" th:classappend="${moviePage.first} ? ' disabled'">
                    <a class="page-link" th:href="@{/movies(page=${moviePage.number - 1}, keyword=${filter.keyword}, genreId=${filter.genreId}, countryId=${filter.countryId}, releaseYear=${filter.releaseYear}, accessLevel=${filter.accessLevel}, movieType=${filter.movieType}, sortBy=${filter.sortBy})}">Trước</a>
                </li>
                <li class="page-item" th:each="pageNumber : ${#numbers.sequence(0, moviePage.totalPages - 1)}" th:classappend="${pageNumber == moviePage.number} ? ' active'">
                    <a class="page-link" th:text="${pageNumber + 1}" th:href="@{/movies(page=${pageNumber}, keyword=${filter.keyword}, genreId=${filter.genreId}, countryId=${filter.countryId}, releaseYear=${filter.releaseYear}, accessLevel=${filter.accessLevel}, movieType=${filter.movieType}, sortBy=${filter.sortBy})}">1</a>
                </li>
                <li class="page-item" th:classappend="${moviePage.last} ? ' disabled'">
                    <a class="page-link" th:href="@{/movies(page=${moviePage.number + 1}, keyword=${filter.keyword}, genreId=${filter.genreId}, countryId=${filter.countryId}, releaseYear=${filter.releaseYear}, accessLevel=${filter.accessLevel}, movieType=${filter.movieType}, sortBy=${filter.sortBy})}">Sau</a>
                </li>
            </ul>
        </nav>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
