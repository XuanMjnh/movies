<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Lỗi hệ thống')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<section class="container-xxl py-5">
    <div class="glass-panel text-center py-5">
        <div class="display-1 fw-bold text-accent mb-3">Oops</div>
        <h1 class="fw-bold text-white" th:text="${errorTitle}">Có lỗi xảy ra</h1>
        <p class="text-secondary mx-auto" style="max-width: 720px" th:text="${errorMessage}">Lỗi</p>
        <p class="small text-secondary">Path: <span th:text="${path}">/path</span></p>
        <a th:href="@{/}" class="btn btn-accent mt-3">Quay về trang chủ</a>
    </div>
</section>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
