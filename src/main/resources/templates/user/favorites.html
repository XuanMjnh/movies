<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Phim yêu thích')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/alerts :: alerts}"></div>
<main class="container-fluid container-stream py-4 py-lg-5">
    <section class="section-shell mb-4">
        <div class="d-flex justify-content-between align-items-center gap-3 flex-wrap mb-3">
            <div>
                <p class="eyebrow mb-2">Thư viện cá nhân</p>
                <h1 class="section-title mb-1">Danh sách yêu thích</h1>
                <p class="section-subtitle mb-0">Những bộ phim bạn đã đánh dấu để xem lại sau.</p>
            </div>
        </div>
        <div class="row row-cols-2 row-cols-md-3 row-cols-xl-5 row-cols-xxl-6 g-4" th:if="${favorites != null and !#lists.isEmpty(favorites)}">
            <th:block th:each="favorite : ${favorites}">
                <div th:if="${favorite != null and favorite.movie != null}" th:replace="~{fragments/movie-card :: movieCard(movie=${favorite.movie})}"></div>
            </th:block>
        </div>
        <div th:if="${favorites == null or #lists.isEmpty(favorites)}" class="glass-panel text-center py-5 mt-3">
            <i class="bi bi-heart fs-1 text-accent"></i>
            <h3 class="text-white mt-3">Chưa có phim yêu thích</h3>
            <a class="btn btn-accent mt-3" th:href="@{/movies}">Khám phá phim ngay</a>
        </div>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
