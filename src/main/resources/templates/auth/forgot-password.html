<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Quên mật khẩu')}"></head>
<body class="auth-body">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<section class="auth-section">
    <div class="auth-card">
        <div class="text-center mb-4">
            <h1 class="fw-bold text-white">Đặt lại mật khẩu</h1>
            <p class="text-secondary mb-0">Phiên bản đồ án dùng luồng reset cơ bản bằng email + mật khẩu mới.</p>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <form th:action="@{/forgot-password}" th:object="${forgotPasswordRequest}" method="post" class="vstack gap-3">
            <div>
                <label class="form-label">Email</label>
                <input th:field="*{email}" class="form-control form-control-lg">
                <div class="invalid-feedback d-block" th:errors="*{email}"></div>
            </div>
            <div>
                <label class="form-label">Mật khẩu mới</label>
                <input type="password" th:field="*{password}" class="form-control form-control-lg">
                <div class="invalid-feedback d-block" th:errors="*{password}"></div>
            </div>
            <div>
                <label class="form-label">Xác nhận mật khẩu</label>
                <input type="password" th:field="*{confirmPassword}" class="form-control form-control-lg">
                <div class="invalid-feedback d-block" th:errors="*{confirmPassword}"></div>
            </div>
            <button class="btn btn-accent btn-lg">Đổi mật khẩu</button>
        </form>
    </div>
</section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
