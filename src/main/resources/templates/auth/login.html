<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Đăng nhập')}"></head>
<body class="auth-body">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<section class="auth-section">
    <div class="auth-card">
        <div class="text-center mb-4">
            <h1 class="fw-bold text-white">Chào mừng quay lại</h1>
            <p class="text-secondary mb-0">Đăng nhập để xem tiếp, nạp tiền và mua gói thành viên.</p>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <div th:if="${param.error}" class="alert alert-danger">Email hoặc mật khẩu không chính xác.</div>
        <div th:if="${param.logout}" class="alert alert-success">Bạn đã đăng xuất thành công.</div>
        <form th:action="@{/login}" method="post" class="vstack gap-3">
            <div>
                <label class="form-label">Email</label>
                <input type="email" name="username" class="form-control form-control-lg" placeholder="user@example.com" required>
            </div>
            <div>
                <label class="form-label">Mật khẩu</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
            </div>
            <button class="btn btn-accent btn-lg w-100" type="submit">Đăng nhập</button>
        </form>
        <div class="d-flex justify-content-between align-items-center mt-4 text-secondary small">
            <a th:href="@{/forgot-password}" class="text-decoration-none text-secondary">Quên mật khẩu?</a>
            <a th:href="@{/register}" class="text-decoration-none text-white">Tạo tài khoản mới</a>
        </div>
        <hr class="border-secondary-subtle my-4">
        <div class="small text-secondary">
            <div><strong class="text-white">Admin:</strong> admin@example.com / admin123</div>
            <div><strong class="text-white">User:</strong> user@example.com / user123</div>
        </div>
    </div>
</section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
