<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Ví tiền')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/alerts :: alerts}"></div>
<main class="container-xxl py-4">
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="glass-panel wallet-balance-card">
                <span class="text-uppercase small text-secondary">Số dư hiện tại</span>
                <h1 class="display-5 fw-bold text-white mt-2" th:text="${#numbers.formatDecimal(wallet.balance, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</h1>
                <div class="d-flex gap-2 mt-4">
                    <a th:href="@{/user/wallet/deposit}" class="btn btn-accent">Nạp tiền</a>
                    <a th:href="@{/user/subscription/current}" class="btn btn-outline-light">Mua gói</a>
                </div>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="glass-panel">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="h4 text-white mb-0">Lịch sử giao dịch gần đây</h2>
                    <a th:href="@{/user/wallet/transactions}" class="btn btn-sm btn-outline-light">Xem tất cả</a>
                </div>
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle mb-0">
                        <thead>
                        <tr>
                            <th>Mã GD</th>
                            <th>Loại</th>
                            <th>Số tiền</th>
                            <th>Trạng thái</th>
                            <th>Số dư sau GD</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="tx : ${recentTransactions}">
                            <td th:text="${tx.referenceCode}">REF</td>
                            <td th:text="${tx.type}">DEPOSIT</td>
                            <td th:text="${#numbers.formatDecimal(tx.amount, 0, 'COMMA', 0, 'POINT')} + ' đ'">100,000 đ</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${tx.status.name() == 'SUCCESS'} ? ' text-bg-success' : (${tx.status.name() == 'PENDING'} ? ' text-bg-warning' : ' text-bg-danger')"
                                      th:text="${tx.status}">SUCCESS</span>
                            </td>
                            <td th:text="${#numbers.formatDecimal(tx.balanceAfter, 0, 'COMMA', 0, 'POINT')} + ' đ'">100,000 đ</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
