<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Lịch sử giao dịch')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container-xxl py-4">
    <div class="glass-panel">
        <h1 class="h3 text-white mb-3">Toàn bộ giao dịch ví</h1>
        <div class="table-responsive">
            <table class="table table-dark table-striped align-middle">
                <thead>
                <tr>
                    <th>Thời gian</th>
                    <th>Mã giao dịch</th>
                    <th>Loại</th>
                    <th>Trạng thái</th>
                    <th>Mô tả</th>
                    <th>Số tiền</th>
                    <th>Số dư sau GD</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="tx : ${transactions}">
                    <td th:text="${#temporals.format(tx.createdAt, 'dd/MM/yyyy HH:mm')}">17/03/2026</td>
                    <td th:text="${tx.referenceCode}">REF</td>
                    <td th:text="${tx.type}">DEPOSIT</td>
                    <td>
                        <span class="badge"
                              th:classappend="${tx.status.name() == 'SUCCESS'} ? ' text-bg-success' : (${tx.status.name() == 'PENDING'} ? ' text-bg-warning' : ' text-bg-danger')"
                              th:text="${tx.status}">SUCCESS</span>
                    </td>
                    <td th:text="${tx.description}">Desc</td>
                    <td th:text="${#numbers.formatDecimal(tx.amount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
                    <td th:text="${#numbers.formatDecimal(tx.balanceAfter, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
