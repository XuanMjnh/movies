<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Nạp tiền qua VNPAY')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/alerts :: alerts}"></div>
<main class="container-xxl py-4">
    <div class="row justify-content-center">
        <div class="col-xl-6 col-lg-8">
            <div class="glass-panel">
                <h1 class="h3 text-white mb-3">Nạp tiền</h1>
                <div class="pill-dark mb-4">Số dư hiện tại: <span class="ms-2 text-accent" th:text="${#numbers.formatDecimal(wallet.balance, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</span></div>
                <form th:action="@{/user/wallet/deposit}" th:object="${depositRequest}" method="post" class="vstack gap-3">
                    <div>
                        <label class="form-label">Số tiền nạp</label>
                        <input th:field="*{amount}" type="number" class="form-control form-control-lg" placeholder="Nhập số tiền, ví dụ 100000">
                        <div class="invalid-feedback d-block" th:errors="*{amount}"></div>
                    </div>
                    <div class="d-flex gap-2 flex-wrap">
                        <button class="btn btn-accent btn-lg">
                            <i class="bi bi-qr-code-scan me-2"></i>Thanh toán với VNPAY
                        </button>
                        <button type="button" class="btn btn-outline-light" onclick="document.querySelector('[name=amount]').value=100000">+100,000</button>
                        <button type="button" class="btn btn-outline-light" onclick="document.querySelector('[name=amount]').value=200000">+200,000</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
