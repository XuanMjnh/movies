spring.config.import=optional:file:.env[.properties]

server.port=8080
spring.application.name=movie-streaming-platform

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Bangkok
spring.jpa.open-in-view=true

spring.sql.init.mode=never
spring.sql.init.encoding=UTF-8
spring.sql.init.continue-on-error=false

spring.thymeleaf.cache=false
spring.web.resources.cache.period=0

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

server.error.whitelabel.enabled=false
server.servlet.session.timeout=120m

app.upload-dir=uploads

app.deposit-payment-provider=SIMULATED_GATEWAY

app.payment.vnpay.enabled=${VNPAY_ENABLED:false}
app.payment.vnpay.tmn-code=${VNPAY_TMN_CODE:}
app.payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
app.payment.vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.payment.vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/payment/vnpay/return}
app.payment.vnpay.locale=${VNPAY_LOCALE:vn}
app.payment.vnpay.order-type=${VNPAY_ORDER_TYPE:other}
app.payment.vnpay.expire-minutes=${VNPAY_EXPIRE_MINUTES:15}


